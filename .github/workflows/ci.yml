name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --all-groups --locked
      - run: uv lock --check
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run pytest --cov=clitg --cov-branch --cov-fail-under=100 --cov-report=term-missing
      - run: uv run python scripts/check_skill.py
      - run: uv run python -m clitg.catalog
      - run: git diff --exit-code -- schemas
      - run: uv build --no-sources

  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --all-groups --locked
      - run: uv run pytest
      - run: uv build --no-sources
      - shell: bash
        run: uvx --from dist/clitg-0.1.0-py3-none-any.whl clitg version
