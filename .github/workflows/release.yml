name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
      - run: uv sync --all-groups --locked
      - name: Validate tag and package version
        shell: bash
        run: test "v$(uv version --short)" = "${GITHUB_REF_NAME}"
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run pytest --cov=clitg --cov-branch --cov-fail-under=100
      - run: uv run python -m clitg.catalog
      - run: git diff --exit-code -- schemas
      - run: uv build --no-sources
      - uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist
      - uses: astral-sh/setup-uv@v8.3.2
      - run: >-
          uv publish --trusted-publishing always
          --check-url https://pypi.org/simple/ dist/*
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --generate-notes \
              --verify-tag \
              --repo "${GITHUB_REPOSITORY}"
          fi
